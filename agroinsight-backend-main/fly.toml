# fly.toml app configuration file generated for agroinsight-backend-main on 2026-06-24T15:24:02-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "agroinsight-backend-main"
primary_region = "gru"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "data"
  destination = "/data"